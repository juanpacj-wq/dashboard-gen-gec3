# Reverse proxy único del servidor pgen.gecelca.com.co. Aloja DOS apps bajo un mismo dominio,
# separadas por ruta:
#   /dashboard  → este app (sin auth). Estáticos dist/ + backend Node (3001) + WS.
#   /bitacora   → Bit-cora-g3 (con auth Entra). Se agrega en Fase 2 (ver bloque placeholder abajo).
#
# Regla de oro: ambos backends comparan req.url por STRING EXACTO. El prefijo /dashboard o
# /bitacora SIEMPRE se quita acá con la barra final en proxy_pass (nginx reemplaza el prefijo
# del location por el path del proxy_pass). Si el backend recibiera el prefijo, daría 404.
#
# TLS: certificado corporativo (NO certbot). fullchain.crt = certificado del host + bundle de
# intermedios (leaf primero). private.key con permisos 600 root:root. Renovación MANUAL antes
# del vencimiento (ver Bit-cora-g3/deploy/DEPLOY.md §6 — el runbook TLS vive allá):
#   openssl x509 -enddate -noout -in /etc/nginx/ssl/pgen.gecelca.com.co/fullchain.crt

# HTTP → HTTPS. Todo el sitio viaja cifrado (Bitácora lo EXIGE: cookie Secure + OIDC; el
# dashboard lo adopta para evitar mixed content y unificar wss).
server {
    listen 80;
    server_name pgen.gecelca.com.co;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pgen.gecelca.com.co;

    ssl_certificate     /etc/nginx/ssl/pgen.gecelca.com.co/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/pgen.gecelca.com.co/private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (sin preload por ahora). OJO: add_header NO se hereda en locations que declaran su
    # propio add_header — esas lo repiten explícito.
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Compresión
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Raíz del dominio → Dashboard (público, sin auth).
    location = / {
        return 302 /dashboard/;
    }

    # ───────────────────────────── DASHBOARD (/dashboard) ─────────────────────────────

    # /dashboard sin barra → /dashboard/ (el location de abajo solo matchea con barra).
    location = /dashboard {
        return 302 /dashboard/;
    }

    # SPA: estáticos del build. El fallback usa named location (NO el tercer parámetro de
    # try_files) porque alias+try_files con URI interna es un pitfall conocido de nginx: la
    # re-resolución puede componer mal la ruta física. El rewrite re-entra al matching de
    # locations y /dashboard/index.html se resuelve limpio contra este mismo alias.
    location /dashboard/ {
        alias /var/www/dashboard-gen/dist/;
        try_files $uri $uri/ @dashboard_fallback;
    }
    location @dashboard_fallback {
        rewrite ^ /dashboard/index.html last;
    }

    # Cache agresivo para assets con hash en el nombre.
    location /dashboard/assets/ {
        alias /var/www/dashboard-gen/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Strict-Transport-Security "max-age=31536000" always;
    }

    # Config de instancia (branding, orden de unidades). Fuera del bundle: per-servidor.
    location = /dashboard/config.json {
        alias /var/www/dashboard-gen/instance/config.json;
        default_type application/json;
        add_header Cache-Control "no-store";
        add_header Strict-Transport-Security "max-age=31536000" always;
    }

    # WebSocket → backend dashboard (strip /dashboard → /ws).
    location = /dashboard/ws {
        proxy_pass http://127.0.0.1:3001/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # XM API CORS proxy (reemplaza el proxy de Vite en producción). strip /dashboard/api/xm → /.
    location /dashboard/api/xm/ {
        proxy_pass https://servapibi.xm.com.co/;
        proxy_set_header Host servapibi.xm.com.co;
        proxy_set_header Origin https://servapibi.xm.com.co;
        proxy_ssl_server_name on;
    }

    # Cross-repo: eventos AUTH/REDESP/PRUEBA los sirve el backend de BITÁCORA (3002), endpoint
    # público. Match exacto: gana al prefijo /dashboard/api/ independientemente del orden.
    location = /dashboard/api/eventos-dashboard {
        proxy_pass http://127.0.0.1:3002/api/eventos-dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Resto de la API → backend dashboard (strip /dashboard → /api/...). Un solo bloque: el
    # backend hace match exacto, así que ya no importa el orden despacho-final vs despacho.
    location /dashboard/api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health del backend dashboard (para curl/monitoreo).
    location = /dashboard/health {
        proxy_pass http://127.0.0.1:3001/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ───────────────────────────── BITÁCORA (/bitacora) ──────────────────────────────
    # Placeholder: en Fase 2 se pegan aquí las locations de Bit-cora-g3 (ver
    # Bit-cora-g3/deploy/nginx-bitacora.conf). Deben quitar el prefijo /bitacora, reenviar
    # Host/Origin/X-Forwarded-Proto y los headers de upgrade en /bitacora/ws/. Requiere TLS
    # (este server block ya lo provee).
}
