server {
    listen 80;
    server_name _;

    root /var/www/dashboard-gen/dist;
    index index.html;

    # Compresión
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # SPA — cualquier ruta que no sea archivo sirve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agresivo para assets con hash en el nombre
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # WebSocket reverse proxy
    location /ws {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # XM API CORS proxy (reemplaza el proxy de Vite en produccion)
    location /api/xm/ {
        proxy_pass https://servapibi.xm.com.co/;
        proxy_set_header Host servapibi.xm.com.co;
        proxy_set_header Origin https://servapibi.xm.com.co;
        proxy_ssl_server_name on;
    }

    # Health check del backend
    location /health {
        proxy_pass http://127.0.0.1:3001/health;
    }
}
